name: Build & Deploy

on:
  push:
    branches:
      - develop
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (dev branch)
        if: github.ref == 'refs/heads/develop'
        env:
          NEXT_PUBLIC_API_BASE_URL: https://evraapp.top/App
          # BUG-CORS-001 fix: use the frontend domain as the REST base URL.
          # api-proxy.php in public/ proxies /api/* to dev.evraapp.top server-side
          # (no CORS — same-origin request from the browser's perspective).
          NEXT_PUBLIC_REST_BASE_URL: https://dev.adalyzeai.xyz
        run: pnpm run build

      - name: Build (main branch)
        if: github.ref == 'refs/heads/main'
        env:
          # Prod backend is at api.evraapp.top (Slim — handles all gofor + REST routes)
          NEXT_PUBLIC_API_BASE_URL: https://api.evraapp.top
          NEXT_PUBLIC_REST_BASE_URL: https://api.evraapp.top
        run: pnpm run build

      - name: Deploy to dev (develop branch)
        if: github.ref == 'refs/heads/develop'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          source: "out/*"
          target: ${{ secrets.CPANEL_DEV_PATH }}
          strip_components: 1
          rm: false

      - name: Deploy to prod (main branch)
        # Prod frontend lives on adlayzer cPanel (adalyzeai.xyz) — separate account from eva
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ADALYZE_FTP_HOST }}
          username: ${{ secrets.ADALYZE_FTP_USER }}
          password: ${{ secrets.ADALYZE_FTP_PASS }}
          source: "out/*"
          target: ${{ secrets.ADALYZE_PROD_PATH }}
          strip_components: 1
          rm: false
