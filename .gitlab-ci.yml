# .gitlab-ci.yml — Adalyze AI Frontend
# Triggers on 'develop' branch only.
# Production CI/CD (main → live cPanel) is out of scope — future task.
#
# Required GitLab CI variables (set in project Settings → CI/CD → Variables):
#   CPANEL_FTP_HOST     — FTP hostname (e.g., ftp.adalyzeai.xyz)
#   CPANEL_FTP_USER     — FTP username
#   CPANEL_FTP_PASS     — FTP password (mark as Protected + Masked)
#   CPANEL_DEV_PATH     — Remote path for dev subdomain (e.g., /home/user/dev_adalyzeai)
#   NEXT_PUBLIC_API_BASE_URL — https://dev.evraapp.top (set per-environment)

stages:
  - build
  - deploy

build:
  stage: build
  image: node:20-alpine
  before_script:
    - apk add --no-cache lftp
    - corepack enable
  script:
    - pnpm install --frozen-lockfile
    - pnpm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - develop

deploy:
  stage: deploy
  image: node:20-alpine
  before_script:
    - apk add --no-cache lftp
  script:
    - lftp -e "mirror -R out/ $CPANEL_DEV_PATH; quit" -u $CPANEL_FTP_USER,$CPANEL_FTP_PASS $CPANEL_FTP_HOST
  dependencies:
    - build
  only:
    - develop
